name: CI

# Build, vet, and test the Go binary. Mirrors dolph/pizzabot so the
# release workflow can chain off of a successful run.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...
